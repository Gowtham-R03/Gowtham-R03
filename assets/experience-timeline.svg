<svg width="1160" height="260" viewBox="0 0 1160 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fireBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#160300"/>
      <stop offset="45%" stop-color="#3a0f00"/>
      <stop offset="75%" stop-color="#4a1400"/>
      <stop offset="100%" stop-color="#120200"/>
    </linearGradient>
    <radialGradient id="emberGlow" cx="50%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#ff6a1a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="fglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1160" height="260" rx="16" fill="url(#fireBg)"/>
  <rect width="1160" height="260" rx="16" fill="url(#emberGlow)"/>
  <rect x="1" y="1" width="1158" height="258" rx="15" fill="none" stroke="#ff8c42" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- rising embers -->
  <g fill="#ffb066">
    <circle cx="230" cy="190" r="2.4" opacity="0">
      <animate attributeName="cy" values="190;30" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="190" r="2" opacity="0">
      <animate attributeName="cy" values="190;20" dur="5.2s" repeatCount="indefinite" begin="1.1s"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5.2s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="810" cy="190" r="2.6" opacity="0">
      <animate attributeName="cy" values="190;25" dur="4.8s" repeatCount="indefinite" begin="2.3s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.8s" repeatCount="indefinite" begin="2.3s"/>
    </circle>
    <circle cx="1060" cy="190" r="2.2" opacity="0" fill="#fff3c4">
      <animate attributeName="cy" values="190;15" dur="4s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>

  <!-- timeline line -->
  <path id="circuitPath" d="M145,190 L1015,190" fill="none" stroke="#7a3311" stroke-width="3"/>
  <path d="M145,190 L1015,190" fill="none" stroke="#ff8c42" stroke-width="1.5" filter="url(#fglow)" opacity="0.75"/>

  <!-- traveling flame pulse with trail -->
  <circle r="3" fill="#ffdca0" opacity="0.35">
    <animateMotion dur="4s" repeatCount="indefinite" begin="-0.3s">
      <mpath href="#circuitPath"/>
    </animateMotion>
  </circle>
  <circle r="4" fill="#ffb066" opacity="0.6">
    <animateMotion dur="4s" repeatCount="indefinite" begin="-0.15s">
      <mpath href="#circuitPath"/>
    </animateMotion>
  </circle>
  <circle r="6" fill="#fff3e0" filter="url(#fglow)">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#circuitPath"/>
    </animateMotion>
  </circle>

  <!-- Node: IBM 2022 -->
  <g transform="translate(145,190)">
    <line x1="0" y1="0" x2="0" y2="-64" stroke="#7a3311" stroke-width="2"/>
    <circle r="16" fill="none" stroke="#ffb066" stroke-width="1.5" opacity="0.65"/>
    <circle r="8" fill="#ff8c42"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="15" y="24" width="260" height="70" rx="10" fill="#1c0904" stroke="#ff8c42" stroke-opacity="0.5"/>
    <text x="145" y="52" font-size="16" font-weight="700" fill="#fff3e6" textLength="150" lengthAdjust="spacingAndGlyphs">2022 · IBM</text>
    <text x="145" y="76" font-size="13" fill="#ffb066" textLength="170" lengthAdjust="spacingAndGlyphs">Application Developer</text>
  </g>

  <!-- Node: SCH Infotech 2023 -->
  <g transform="translate(435,190)">
    <line x1="0" y1="0" x2="0" y2="-64" stroke="#7a3311" stroke-width="2"/>
    <circle r="16" fill="none" stroke="#ffb066" stroke-width="1.5" opacity="0.65"/>
    <circle r="8" fill="#ff8c42"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="305" y="24" width="260" height="70" rx="10" fill="#1c0904" stroke="#ff8c42" stroke-opacity="0.5"/>
    <text x="435" y="52" font-size="16" font-weight="700" fill="#fff3e6" textLength="196" lengthAdjust="spacingAndGlyphs">2023 · SCH Infotech</text>
    <text x="435" y="76" font-size="13" fill="#ffb066" textLength="160" lengthAdjust="spacingAndGlyphs">Full Stack Developer</text>
  </g>

  <!-- Node: Cobay 2025 -->
  <g transform="translate(725,190)">
    <line x1="0" y1="0" x2="0" y2="-64" stroke="#7a3311" stroke-width="2"/>
    <circle r="16" fill="none" stroke="#ffb066" stroke-width="1.5" opacity="0.65"/>
    <circle r="8" fill="#ff8c42"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="595" y="24" width="260" height="70" rx="10" fill="#1c0904" stroke="#ff8c42" stroke-opacity="0.5"/>
    <text x="725" y="52" font-size="16" font-weight="700" fill="#fff3e6" textLength="130" lengthAdjust="spacingAndGlyphs">2025 · Cobay</text>
    <text x="725" y="76" font-size="13" fill="#ffb066" textLength="140" lengthAdjust="spacingAndGlyphs">Software Engineer</text>
  </g>

  <!-- Node: Canorouse Technology 2026 (current, white-hot highlight) -->
  <g transform="translate(1015,190)">
    <line x1="0" y1="0" x2="0" y2="-64" stroke="#ffd76a" stroke-width="2"/>
    <circle r="22" fill="none" stroke="#ffcf6b" stroke-width="1.5" filter="url(#fglow)">
      <animate attributeName="r" values="17;24;17" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="9" fill="#fffbe6" filter="url(#fglow)"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <rect x="885" y="24" width="260" height="70" rx="10" fill="#2b1200" stroke="#ffe9b0" stroke-opacity="0.65"/>
    <text x="1015" y="52" font-size="16" font-weight="700" fill="#ffffff" textLength="180" lengthAdjust="spacingAndGlyphs">2026 · Canorouse</text>
    <text x="1015" y="76" font-size="13" fill="#ffe9b0" textLength="190" lengthAdjust="spacingAndGlyphs">Senior Software Engineer</text>
  </g>
</svg>
