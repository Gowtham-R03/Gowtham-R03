<svg width="1160" height="550" viewBox="0 0 1160 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stormBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04050c"/>
      <stop offset="40%" stop-color="#0b1230"/>
      <stop offset="70%" stop-color="#131a3f"/>
      <stop offset="100%" stop-color="#05060f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="cloudSoft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3266" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a3266" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1160" height="550" rx="16" fill="url(#stormBg)"/>
  <rect x="1" y="1" width="1158" height="548" rx="15" fill="none" stroke="#9fd8ff" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- storm clouds (soft gradient blobs, no per-frame filter cost) -->
  <g>
    <ellipse cx="180" cy="44" rx="200" ry="72" fill="url(#cloudSoft)"/>
    <ellipse cx="620" cy="24" rx="260" ry="68" fill="url(#cloudSoft)"/>
    <ellipse cx="980" cy="54" rx="220" ry="72" fill="url(#cloudSoft)"/>
  </g>

  <!-- lightning bolts, flickering -->
  <g fill="none" stroke="#cfe9ff" stroke-width="3" stroke-linejoin="round" filter="url(#glow)">
    <path d="M150,0 L130,80 L155,92 L120,195 L148,208 L110,330 L140,342 L100,550" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;0.4;0;0;0;0" keyTimes="0;0.1;0.35;0.4;0.45;0.5;0.7;0.9;1" dur="5.2s" repeatCount="indefinite"/>
    </path>
    <path d="M1010,0 L990,75 L1018,88 L985,190 L1015,205 L980,315 L1008,328 L965,550" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;0.4;0;0;0;0" keyTimes="0;0.2;0.55;0.6;0.65;0.7;0.85;0.97;1" dur="7.4s" repeatCount="indefinite" begin="2.4s"/>
    </path>
  </g>

  <!-- ambient thunder flash -->
  <rect width="1160" height="550" fill="#dcefff" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.14;0.03;0;0;0;0" keyTimes="0;0.1;0.35;0.4;0.45;0.5;0.7;0.9;1" dur="5.2s" repeatCount="indefinite"/>
  </rect>

  <!-- corner lightning-bolt emblem -->
  <g transform="translate(1092,64)">
    <path d="M-4,-34 L-26,10 L-6,10 L-14,40 L28,-6 L6,-6 L16,-34 Z" fill="#eaf6ff" filter="url(#glow)" opacity="0.9">
      <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M-4,-34 L-26,10 L-6,10 L-14,40 L28,-6 L6,-6 L16,-34 Z" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;0;0;0" keyTimes="0;0.35;0.4;0.43;0.48;0.7;1" dur="5.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- category rows -->
  <g font-family="Arial, Helvetica, sans-serif">

    <!-- Frontend -->
    <text x="580" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf6ff">Frontend</text>
    <g font-size="14" font-weight="700">
      <rect x="143" y="78" width="120" height="38" rx="9" fill="#DD0031"/>
      <text x="203" y="103" text-anchor="middle" fill="#ffffff" textLength="96" lengthAdjust="spacingAndGlyphs">ANGULAR</text>
      <rect x="277" y="78" width="100" height="38" rx="9" fill="#20232A"/>
      <text x="327" y="103" text-anchor="middle" fill="#61DAFB" textLength="76" lengthAdjust="spacingAndGlyphs">REACT</text>
      <rect x="391" y="78" width="100" height="38" rx="9" fill="#4FC08D"/>
      <text x="441" y="103" text-anchor="middle" fill="#ffffff" textLength="76" lengthAdjust="spacingAndGlyphs">VUE.JS</text>
      <rect x="505" y="78" width="145" height="38" rx="9" fill="#3178C6"/>
      <text x="577.5" y="103" text-anchor="middle" fill="#ffffff" textLength="121" lengthAdjust="spacingAndGlyphs">TYPESCRIPT</text>
      <rect x="664" y="78" width="145" height="38" rx="9" fill="#F7DF1E"/>
      <text x="736.5" y="103" text-anchor="middle" fill="#1a1a1a" textLength="121" lengthAdjust="spacingAndGlyphs">JAVASCRIPT</text>
      <rect x="823" y="78" width="95" height="38" rx="9" fill="#E34F26"/>
      <text x="870.5" y="103" text-anchor="middle" fill="#ffffff" textLength="71" lengthAdjust="spacingAndGlyphs">HTML5</text>
      <rect x="932" y="78" width="85" height="38" rx="9" fill="#1572B6"/>
      <text x="974.5" y="103" text-anchor="middle" fill="#ffffff" textLength="61" lengthAdjust="spacingAndGlyphs">CSS3</text>
    </g>

    <!-- Backend -->
    <text x="580" y="152" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf6ff">Backend</text>
    <g font-size="14" font-weight="700">
      <rect x="319" y="178" width="150" height="38" rx="9" fill="#6DB33F"/>
      <text x="394" y="203" text-anchor="middle" fill="#ffffff" textLength="126" lengthAdjust="spacingAndGlyphs">SPRING BOOT</text>
      <rect x="483" y="178" width="115" height="38" rx="9" fill="#339933"/>
      <text x="540.5" y="203" text-anchor="middle" fill="#ffffff" textLength="91" lengthAdjust="spacingAndGlyphs">NODE.JS</text>
      <rect x="612" y="178" width="110" height="38" rx="9" fill="#000000" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="667" y="203" text-anchor="middle" fill="#ffffff" textLength="86" lengthAdjust="spacingAndGlyphs">EXPRESS</text>
      <rect x="736" y="178" width="105" height="38" rx="9" fill="#E0234E"/>
      <text x="788.5" y="203" text-anchor="middle" fill="#ffffff" textLength="81" lengthAdjust="spacingAndGlyphs">NESTJS</text>
    </g>

    <!-- Database -->
    <text x="580" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf6ff">Database</text>
    <g font-size="14" font-weight="700">
      <rect x="458" y="278" width="100" height="38" rx="9" fill="#4479A1"/>
      <text x="508" y="303" text-anchor="middle" fill="#ffffff" textLength="76" lengthAdjust="spacingAndGlyphs">MYSQL</text>
      <rect x="572" y="278" width="130" height="38" rx="9" fill="#47A248"/>
      <text x="637" y="303" text-anchor="middle" fill="#ffffff" textLength="106" lengthAdjust="spacingAndGlyphs">MONGODB</text>
    </g>

    <!-- AI / Computer Vision -->
    <text x="530" y="352" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf6ff">AI / Computer Vision</text>
    <text x="705" y="352" text-anchor="middle" font-size="12" fill="#9fb3d9">· from side projects</text>
    <g font-size="14" font-weight="700">
      <rect x="262" y="378" width="105" height="38" rx="9" fill="#3776AB"/>
      <text x="314.5" y="403" text-anchor="middle" fill="#ffffff" textLength="81" lengthAdjust="spacingAndGlyphs">PYTHON</text>
      <rect x="381" y="378" width="115" height="38" rx="9" fill="#5C3EE8"/>
      <text x="438.5" y="403" text-anchor="middle" fill="#ffffff" textLength="91" lengthAdjust="spacingAndGlyphs">OPENCV</text>
      <rect x="510" y="378" width="150" height="38" rx="9" fill="#FF6F00"/>
      <text x="585" y="403" text-anchor="middle" fill="#ffffff" textLength="126" lengthAdjust="spacingAndGlyphs">TENSORFLOW</text>
      <rect x="674" y="378" width="115" height="38" rx="9" fill="#000000" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="731.5" y="403" text-anchor="middle" fill="#ffffff" textLength="91" lengthAdjust="spacingAndGlyphs">THREE.JS</text>
      <rect x="803" y="378" width="95" height="38" rx="9" fill="#88CE02"/>
      <text x="850.5" y="403" text-anchor="middle" fill="#1a1a1a" textLength="71" lengthAdjust="spacingAndGlyphs">GSAP</text>
    </g>

    <!-- Cloud & DevOps -->
    <text x="580" y="452" text-anchor="middle" font-size="18" font-weight="700" fill="#eaf6ff">Cloud &amp; DevOps</text>
    <g font-size="14" font-weight="700">
      <rect x="351.5" y="478" width="80" height="38" rx="9" fill="#232F3E" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="391.5" y="503" text-anchor="middle" fill="#ffffff" textLength="56" lengthAdjust="spacingAndGlyphs">AWS</text>
      <rect x="445.5" y="478" width="115" height="38" rx="9" fill="#2496ED"/>
      <text x="503" y="503" text-anchor="middle" fill="#ffffff" textLength="91" lengthAdjust="spacingAndGlyphs">DOCKER</text>
      <rect x="574.5" y="478" width="145" height="38" rx="9" fill="#326CE5"/>
      <text x="647" y="503" text-anchor="middle" fill="#ffffff" textLength="121" lengthAdjust="spacingAndGlyphs">KUBERNETES</text>
      <rect x="733.5" y="478" width="75" height="38" rx="9" fill="#F05032"/>
      <text x="771" y="503" text-anchor="middle" fill="#ffffff" textLength="51" lengthAdjust="spacingAndGlyphs">GIT</text>
    </g>

  </g>
</svg>
